run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gci
    - misspell
    - unconvert
    - godot
    - noctx
    - bodyclose
    - exhaustive
    - copyloopvar
    - unparam

linters-settings:
  goimports:
    local-prefixes: booking-service
  gci:
    sections:
      - standard
      - default
      - prefix(booking-service)
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
